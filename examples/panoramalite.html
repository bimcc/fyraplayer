<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FyraPlayer PanoramaLite Demo</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 20px;
        background: #f4f6f8;
        color: #172033;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .page {
        width: 100%;
        max-width: 980px;
        margin: 0 auto;
        min-width: 0;
      }
      h1 {
        margin: 0 0 14px;
        font-size: 22px;
        font-weight: 650;
      }
      .player-shell {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.16);
      }
      #video {
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
      }
      .controls {
        display: grid;
        grid-template-columns: minmax(150px, 0.85fr) minmax(0, 1.5fr) repeat(7, auto);
        gap: 10px;
        margin-top: 14px;
        align-items: center;
        min-width: 0;
      }
      .toggle {
        height: 36px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #fff;
        color: #111827;
        padding: 0 10px;
        font-size: 13px;
        white-space: nowrap;
      }
      .toggle input {
        width: 14px;
        height: 14px;
        min-width: 14px;
        padding: 0;
      }
      input, select, button {
        height: 36px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #fff;
        color: #111827;
        font-size: 13px;
      }
      input {
        min-width: 0;
        padding: 0 10px;
      }
      select {
        min-width: 0;
        padding: 0 8px;
      }
      button {
        min-width: 0;
        padding: 0 14px;
        cursor: pointer;
        font-weight: 550;
      }
      button.primary {
        background: #0f766e;
        border-color: #0f766e;
        color: #fff;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .status {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }
      .metric {
        min-width: 0;
        border: 1px solid #d8dee9;
        border-radius: 6px;
        background: #fff;
        padding: 8px 10px;
        font-size: 12px;
        color: #334155;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .log {
        margin-top: 12px;
        min-height: 56px;
        max-height: 120px;
        overflow: auto;
        border: 1px solid #d8dee9;
        border-radius: 6px;
        background: #fff;
        padding: 10px;
        color: #334155;
        font: 12px/1.45 Consolas, "SF Mono", monospace;
        white-space: pre-wrap;
      }
      .plugin-panel {
        margin-top: 12px;
        border: 1px solid #d8dee9;
        border-radius: 6px;
        background: #fff;
        overflow: hidden;
      }
      .plugin-panel[hidden] {
        display: none;
      }
      .plugin-row {
        display: grid;
        grid-template-columns: minmax(120px, 0.45fr) minmax(0, 1fr);
        gap: 10px;
        padding: 9px 10px;
        border-top: 1px solid #edf1f7;
        font-size: 12px;
        color: #334155;
      }
      .plugin-row:first-child {
        border-top: 0;
      }
      .plugin-row strong {
        color: #172033;
        font-weight: 650;
      }
      @media (max-width: 720px) {
        body { padding: 12px; }
        .controls {
          grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        }
        .controls input {
          grid-column: 1 / -1;
        }
        .controls > * {
          width: 100%;
        }
        .status {
          grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>PanoramaLite</h1>
      <div class="player-shell" id="pano-shell">
        <video id="video" muted playsinline crossorigin="anonymous"></video>
      </div>
      <div class="controls">
        <select id="source-preset" aria-label="Preset source">
          <option value="generated-image">Generated grid</option>
          <option value="naver-hls">Naver equirect HLS</option>
          <option value="radiant-hls">Radiant Lac de Bimont HLS</option>
          <option value="electroteque-hls">Electroteque flight HLS</option>
          <option value="mediamtx-hls">MediaMTX HLS local</option>
          <option value="mediamtx-webrtc">MediaMTX WebRTC local</option>
          <option value="local-mp4">Local MP4 file</option>
          <option value="custom">Custom URL</option>
        </select>
        <input id="source-url" type="text" />
        <select id="source-kind">
          <option value="image">Image</option>
          <option value="file">MP4/File</option>
          <option value="hls">HLS</option>
          <option value="webrtc">WebRTC</option>
        </select>
        <label class="toggle"><input id="panorama-enabled" type="checkbox" checked />Panorama</label>
        <label class="toggle"><input id="flip-x" type="checkbox" />Flip X</label>
        <label class="toggle"><input id="flip-y" type="checkbox" />Flip Y</label>
        <button id="load" class="primary">Load</button>
        <button id="reset">Reset</button>
        <button id="plugins-toggle" aria-expanded="false" aria-controls="plugin-panel">Plugins</button>
      </div>
      <div class="status">
        <div class="metric" id="state">state: idle</div>
        <div class="metric" id="view">view: -</div>
        <div class="metric" id="video-info">video: -</div>
        <div class="metric" id="canvas-info">canvas: -</div>
      </div>
      <div class="plugin-panel" id="plugin-panel" hidden>
        <div class="plugin-row"><strong>Configured</strong><span id="plugin-configured">-</span></div>
        <div class="plugin-row"><strong>Active</strong><span id="plugin-active">-</span></div>
        <div class="plugin-row"><strong>Mode</strong><span id="plugin-mode">-</span></div>
      </div>
      <div class="log" id="log"></div>
    </main>
    <script type="module" src="./panoramalite.ts"></script>
  </body>
</html>
